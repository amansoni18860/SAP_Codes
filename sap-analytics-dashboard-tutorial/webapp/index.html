<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <!-- Makes the UI responsive on phones, tablets, and desktops. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAP Analytics Dashboard Tutorial</title>
  <!--
    SAPUI5 bootstrap script.
    This loads the UI5 framework, applies a theme, maps our namespace to files,
    and starts ComponentSupport so the component below can be created.

    Important bootstrap attributes:
    - data-sap-ui-theme: chooses the SAP Fiori visual theme.
    - data-sap-ui-resourceroots: maps our app namespace to this folder.
    - data-sap-ui-oninit: starts ComponentSupport after UI5 is ready.
    - data-sap-ui-compatVersion: uses modern UI5 behavior.
    - data-sap-ui-async: loads UI5 modules asynchronously.
    - data-sap-ui-preload: avoids Component-preload.js lookup in learning mode.
    - data-sap-ui-frameOptions: frame security setting for trusted scenarios.
  -->
  <script
    id="sap-ui-bootstrap"
    src="https://ui5.sap.com/1.120.0/resources/sap-ui-core.js"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-resourceroots='{"sap.analytics.dashboard.tutorial": "./"}'
    data-sap-ui-oninit="module:sap/ui/core/ComponentSupport"
    data-sap-ui-compatVersion="edge"
    data-sap-ui-async="true"
    data-sap-ui-preload="off"
    data-sap-ui-frameOptions="trusted">
  </script>
</head>
<body class="sapUiBody sapUiSizeCompact" id="content">
  <!--
    Component placeholder.
    UI5 replaces this div with the root view from manifest.json.
  -->
  <div
    data-sap-ui-component
    data-name="sap.analytics.dashboard.tutorial"
    data-id="container"
    data-settings='{"id": "sapAnalyticsDashboardTutorial"}'>
  </div>
</body>
</html>
